              <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameHub</title>
<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #0f172a;
        color: white;
        text-align: center;
    }
    header {
        background: linear-gradient(90deg, #7c3aed, #06b6d4);
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
    }
    .games {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px;
    }
    .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
    }
    .card:hover {
        transform: scale(1.05);
        background: #334155;
    }
    canvas {
        background: black;
        display: none;
        margin: 20px auto;
        border: 2px solid #06b6d4;
    }
    #score {
        font-size: 20px;
    }
</style>
</head>
<body>

<header>🎮 GameHub</header>

<h2>Choose a Game</h2>

<div class="games">
    <div class="card" onclick="startGame('clicker')">Click Speed Game</div>
    <div class="card" onclick="startGame('snake')">Snake Game</div>
</div>

<h3 id="score"></h3>
<canvas id="gameCanvas" width="400" height="400"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
let scoreText = document.getElementById("score");

/* -------- CLICK GAME -------- */
function clickGame() {
    let score = 0;
    let time = 10;
    scoreText.innerText = "Score: 0 | Time: 10";

    canvas.style.display = "block";

    canvas.onclick = () => {
        score++;
        scoreText.innerText = "Score: " + score + " | Time: " + time;
    };

    let timer = setInterval(() => {
        time--;
        scoreText.innerText = "Score: " + score + " | Time: " + time;
        if (time <= 0) {
            clearInterval(timer);
            alert("Final Score: " + score);
            canvas.style.display = "none";
        }
    }, 1000);
}

/* -------- SNAKE GAME -------- */
let snake, food, dx, dy;

function snakeGame() {
    canvas.style.display = "block";
    snake = [{x: 200, y: 200}];
    food = {x: 100, y: 100};
    dx = 20;
    dy = 0;
    scoreText.innerText = "Snake Score: 0";
    let score = 0;

    document.onkeydown = e => {
        if (e.key === "ArrowUp") { dx = 0; dy = -20; }
        if (e.key === "ArrowDown") { dx = 0; dy = 20; }
        if (e.key === "ArrowLeft") { dx = -20; dy = 0; }
        if (e.key === "ArrowRight") { dx = 20; dy = 0; }
    };

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 400, 400);

        ctx.fillStyle = "lime";
        snake.forEach(s => ctx.fillRect(s.x, s.y, 20, 20));

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, 20, 20);

        let head = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreText.innerText = "Snake Score: " + score;
            food = {
                x: Math.floor(Math.random() * 20) * 20,
                y: Math.floor(Math.random() * 20) * 20
            };
        } else {
            snake.pop();
        }

        if (
            head.x < 0 || head.y < 0 ||
            head.x >= 400 || head.y >= 400 ||
            snake.slice(1).some(s => s.x === head.x && s.y === head.y)
        ) {
            alert("Game Over! Score: " + score);
            canvas.style.display = "none";
            return;
        }

        setTimeout(draw, 100);
    }

    draw();
}

/* -------- GAME SWITCH -------- */
function startGame(game) {
    if (game === "clicker") clickGame();
    if (game === "snake") snakeGame();
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GameHub X</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    text-align:center;
}

header {
    background:linear-gradient(90deg,#9333ea,#06b6d4);
    padding:20px;
    font-size:30px;
    font-weight:bold;
    letter-spacing:2px;
}

.games {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 10px #06b6d4;
}

.card:hover {
    transform:scale(1.08);
    box-shadow:0 0 25px #9333ea;
}

canvas {
    background:black;
    display:none;
    margin:20px auto;
    border:2px solid cyan;
    box-shadow:0 0 20px cyan;
}

#score {
    font-size:20px;
}
</style>
</head>

<body>

<header>🔥 GameHub X</header>
<h2>Select Game</h2>

<div class="games">
    <div class="card" onclick="startGame('aim')">🎯 Aim Trainer</div>
    <div class="card" onclick="startGame('car')">🚗 Car Dodge</div>
    <div class="card" onclick="startGame('breakout')">🧱 Breakout</div>
</div>

<h3 id="score"></h3>
<canvas id="gameCanvas" width="500" height="400"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
let scoreText = document.getElementById("score");

/* -------- AIM TRAINER -------- */
function aimGame() {
    canvas.style.display = "block";
    let score = 0;
    let target = {x:200,y:200};

    canvas.onclick = e => {
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left;
        let y = e.clientY - rect.top;

        if(Math.hypot(x-target.x,y-target.y) < 30){
            score++;
            target.x = Math.random()*450;
            target.y = Math.random()*350;
        }
    };

    function draw(){
        ctx.fillStyle="black";
        ctx.fillRect(0,0,500,400);

        ctx.beginPath();
        ctx.arc(target.x,target.y,30,0,Math.PI*2);
        ctx.fillStyle="red";
        ctx.shadowBlur=20;
        ctx.shadowColor="red";
        ctx.fill();

        scoreText.innerText="Score: "+score;
        requestAnimationFrame(draw);
    }
    draw();
}

/* -------- CAR GAME -------- */
function carGame(){
    canvas.style.display="block";
    let car={x:220};
    let enemies=[{x:Math.random()*450,y:0}];
    let score=0;

    document.onkeydown=e=>{
        if(e.key==="ArrowLeft") car.x-=20;
        if(e.key==="ArrowRight") car.x+=20;
    };

    function draw(){
        ctx.fillStyle="#111";
        ctx.fillRect(0,0,500,400);

        // road lines
        ctx.strokeStyle="white";
        for(let i=0;i<400;i+=40){
            ctx.strokeRect(245,i,10,20);
        }

        // player car
        ctx.fillStyle="cyan";
        ctx.fillRect(car.x,350,50,30);

        // enemies
        ctx.fillStyle="red";
        enemies.forEach(e=>{
            e.y+=5;
            ctx.fillRect(e.x,e.y,50,30);

            if(e.y>400){
                e.y=0;
                e.x=Math.random()*450;
                score++;
            }

            if(e.y>320 && e.x<car.x+50 && e.x+50>car.x){
                alert("Crash! Score: "+score);
                canvas.style.display="none";
            }
        });

        scoreText.innerText="Score: "+score;
        requestAnimationFrame(draw);
    }
    draw();
}

/* -------- BREAKOUT -------- */
function breakoutGame(){
    canvas.style.display="block";
    let paddle=200;
    let ball={x:250,y:200,dx:4,dy:4};
    let score=0;

    document.onmousemove=e=>{
        paddle=e.clientX-250;
    };

    function draw(){
        ctx.fillStyle="black";
        ctx.fillRect(0,0,500,400);

        ctx.fillStyle="white";
        ctx.fillRect(paddle,380,100,10);

        ctx.beginPath();
        ctx.arc(ball.x,ball.y,10,0,Math.PI*2);
        ctx.fillStyle="yellow";
        ctx.shadowBlur=15;
        ctx.shadowColor="yellow";
        ctx.fill();

        ball.x+=ball.dx;
        ball.y+=ball.dy;

        if(ball.x<0||ball.x>500) ball.dx*=-1;
        if(ball.y<0) ball.dy*=-1;

        if(ball.y>370 && ball.x>paddle && ball.x<paddle+100){
            ball.dy*=-1;
            score++;
        }

        if(ball.y>400){
            alert("Game Over! Score: "+score);
            canvas.style.display="none";
        }

        scoreText.innerText="Score: "+score;
        requestAnimationFrame(draw);
    }
    draw();
}

/* -------- SWITCH -------- */
function startGame(g){
    if(g==="aim") aimGame();
    if(g==="car") carGame();
    if(g==="breakout") breakoutGame();
}
</script>

</body>
</html>
